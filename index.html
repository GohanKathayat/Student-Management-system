<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="right-panel">
      <form id="loginForm">
        <h2>Welcome back</h2>
        <p>Please log in to continue.</p>
        <div class="input-box"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Enter email" required></div>
        <div class="input-box"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Enter password" required><span id="togglePassword"><i class="fas fa-eye"></i></span></div>
        <button type="submit" class="login-btn">Login</button>
        <div class="links"><a href="#">Forgot password?</a></div>
        <div class="signup-text">Don't have an account? <a href="signup.html">Sign up</a></div>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
